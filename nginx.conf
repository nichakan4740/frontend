server {
   listen 80 ;
   listen [::]:80
   location / {
      root /usr/share/nginx/html;
      index index.html;
      try_file $uri /index.html
   }
   location /api {
      proxy_pass http://intproj21.sit.kmutt.ac.th:8080/kw2/api/booking;
   }
   location /kw2/ {
      proxy_pass http://intproj21.sit.kmutt.ac.th:8080/kw2/api/booking;
   }
     location /kw2/api {
      proxy_pass http://intproj21.sit.kmutt.ac.th:8080/kw2/api/booking;
   }
}