events {
  worker_connections  4096;  ## Default: 1024
}
http {
 server {
   listen 80;
   listen [::]:80;
   include /etc/nginx/conf.d/*.conf;

   server_name http://intproj21.sit.kmutt.ac.th/kw2/;
 
   location /api {
       proxy_pass http://backend/api:8080;
       proxy_set_header Host $host;
   }
 }
}