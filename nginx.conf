events {
  worker_connections  4096;  ## Default: 1024
}
http {
 server {
   listen 80;
   listen [::]:80;
   server_name http://intproj21.sit.kmutt.ac.th/kw2/;
   root /usr/share/nginx/html

   location / {
       try_files $uri/ /index.html;
   }
   location /api {
        proxy_pass http://backend:80/api;
		    proxy_redirect off;
		    rewrite ^/(.*) /$1 break;
   }

 }
}