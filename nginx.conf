server {
     listen       80;
        server_name  intproj21.sit.kmutt.ac.th/kw2/;

     location / {
        root   /usr/share/nginx/html;
 	      index index.html;
         try_files $uri /index.html;
    }
     location /api {
           proxy_pass backend:8080 
   }
   location /kw2/ {
           proxy_pass frontend:80 
   }         
 }



                    