upstream backend {
   server backend:8080
}

server {
   listen 80 ;
   listen [::]:80
   location / {
      root /usr/share/nginx/html;
      index index.html;
      try_file $uri /index.html
   }
   location /kw2/api {
      proxy_pass backend:8080;
   }
   location /kw2/ {
      proxy_pass backend:8080;
   }
   location /api {
      proxy_pass backend:8080;
   }
}